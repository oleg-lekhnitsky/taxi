    <script>

      const BRAND_COLORS = {
        white: { c: 0, m: 0, y: 0, k: 0 },

      let outlineFont = null;
      let outlineFontLoadPromise = null;
      let currentLanguage = "ru";

      function setCmykFill(doc, colorName) {
        const color = BRAND_COLORS[colorName] || BRAND_COLORS.black;
        doc.setFillColor(
          String(color.c / 100),
          String(color.m / 100),
          String(color.y / 100),
          String(color.k / 100),
        );
      }

      function cmykToRgb({ c, m, y, k }) {
        c /= 100;
        m /= 100;
        y /= 100;
        k /= 100;
        return {
          r: Math.round(255 * (1 - c) * (1 - k)),
          g: Math.round(255 * (1 - m) * (1 - k)),
          b: Math.round(255 * (1 - y) * (1 - k)),
        };
      }

      function rgbHexFromCmyk(cmyk) {
        const { r, g, b } = cmykToRgb(cmyk);
        return (
          "#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("")
        );
      }

      function brandHex(name) {
        return rgbHexFromCmyk(BRAND_COLORS[name] || BRAND_COLORS.black);
      }

      function cleanSvgText(svgText) {
        return svgText
          .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "")
          .replace(/\son\w+="[^"]*"/gi, "")
          .replace(/\son\w+='[^']*'/gi, "");
      }

      function parseSvg(svgText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(svgText, "image/svg+xml");
        return doc.querySelector("svg");
      }

      function clearSlot(slot) {
        while (slot.firstChild) slot.removeChild(slot.firstChild);
      }

      function forceSvgChildrenToBrandColor(root, colorName) {
        const color = brandHex(colorName);
        const elements = [root, ...root.querySelectorAll("*")];

        elements.forEach((el) => {
          el.setAttribute("data-color", colorName);
          el.style.fill = "";
          el.style.stroke = "";

          const fill = el.getAttribute("fill");
          const stroke = el.getAttribute("stroke");

          if (fill !== "none") el.setAttribute("fill", color);
          if (stroke && stroke !== "none") el.setAttribute("stroke", color);
        });
      }

      function normalizeUploadedSvg(svg, slot) {
        const originalWidth = parseFloat(svg.getAttribute("width")) || 120;
        const originalHeight = parseFloat(svg.getAttribute("height")) || 90;
        const slotWidth = parseFloat(slot.dataset.slotWidth) || 120;
        const slotHeight = parseFloat(slot.dataset.slotHeight) || 90;

        if (!svg.getAttribute("viewBox")) {
          svg.setAttribute("viewBox", `0 0 ${originalWidth} ${originalHeight}`);
        }

        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.setAttribute("x", "0");
        svg.setAttribute("y", "0");
        svg.setAttribute("width", slotWidth);
        svg.setAttribute("height", slotHeight);
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        return svg;
      }

      function handleSvgUpload(inputId, slotId) {
        const input = document.getElementById(inputId);
        const slot = document.getElementById(slotId);
        const uploadText = document.getElementById(`${inputId}Text`);

        input.addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (!file) return;
          if (uploadText) {
            uploadText.textContent = file.name;
            uploadText.dataset.hasFile = "true";
          }

          const reader = new FileReader();

          reader.onload = (e) => {
            importSvgIntoSlot(e.target.result, slot);
          };

          reader.readAsText(file);
        });
      }

      function importSvgIntoSlot(svgText, slot) {
        const clean = cleanSvgText(svgText);
        const svg = parseSvg(clean);
        if (!svg) return;

        const imported = document.importNode(svg, true);
        normalizeUploadedSvg(imported, slot);

        const logoColor = slot.dataset.logoColor || "black";
        imported.setAttribute("data-color", logoColor);
        forceSvgChildrenToBrandColor(imported, logoColor);

        clearSlot(slot);
        slot.appendChild(imported);
      }

      async function loadDefaultLogo1() {
        try {
          const response = await fetch("logo.svg");
          if (!response.ok) throw new Error("Could not load logo.svg");

          const svgText = await response.text();
          importSvgIntoSlot(svgText, document.getElementById("logo1Slot"));
        } catch (error) {
          console.warn(error);
        }
      }

      function wrapSvgText(textEl, text, maxWidth, lineHeight, y) {
        textEl.textContent = "";

        let lineY = y;
        let lineCount = 0;
        const x = textEl.getAttribute("x");

        textEl.setAttribute("y", y);

        if (!text.trim()) {
          const tspan = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "tspan",
          );
          tspan.setAttribute("x", x);
          tspan.setAttribute("y", lineY);
          tspan.textContent = " ";
          textEl.appendChild(tspan);
          return 1;
        }

        function appendLine(value) {
          const tspan = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "tspan",
          );
          tspan.setAttribute("x", x);
          tspan.setAttribute("y", lineY);
          tspan.textContent = value || " ";
          textEl.appendChild(tspan);

          lineY += lineHeight;
          lineCount += 1;

          return tspan;
        }

        text
          .replace(/\r\n/g, "\n")
          .split("\n")
          .forEach((sourceLine) => {
            const words = sourceLine.trim().split(/\s+/).filter(Boolean);

            if (!words.length) {
              appendLine(" ");
              return;
            }

            let line = "";
            let tspan = appendLine("");

            words.forEach((word) => {
              const testLine = line ? line + " " + word : word;
              tspan.textContent = testLine;

              if (tspan.getComputedTextLength() > maxWidth && line) {
                tspan.textContent = line;
                line = word;
                tspan = appendLine(line);
              } else {
                line = testLine;
              }
            });
          });

        return lineCount;
      }

      function applySemanticPreviewColors(svgRoot) {
        svgRoot.querySelectorAll("[data-color]").forEach((el) => {
          const colorName = el.dataset.color || "black";
          const color = brandHex(colorName);

          if (el.getAttribute("fill") !== "none") {
            el.setAttribute("fill", color);
          }

          el.querySelectorAll("*").forEach((child) => {
            if (!child.getAttribute("data-color"))
              child.setAttribute("data-color", colorName);

            if (child.getAttribute("fill") !== "none") {
              child.setAttribute("fill", color);
            }

            if (
              child.getAttribute("stroke") &&
              child.getAttribute("stroke") !== "none"
            ) {
              child.setAttribute("stroke", color);
            }
          });
        });
      }

      function applyLanguage(language) {
        const dictionary = I18N[language] || I18N.ru;
        const previousOptions = I18N[currentLanguage].subheadingOptions;
        const subheadingInput = document.getElementById("subheadingInput");
        const subheadingPresets = document.getElementById("subheadingPresets");
        const paragraphInput = document.getElementById("paragraphInput");
        const previousSubheadingValue = subheadingInput.value;
        const previousSubheadingIndex = previousOptions.findIndex(
          ([value]) => value === previousSubheadingValue,
        );
        const previousParagraph = paragraphInput.value.trim();

        currentLanguage = language;
        document.documentElement.lang = language;
        document.title = dictionary.documentTitle;

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          if (key === "fileEmpty" && el.dataset.hasFile === "true") return;
          if (dictionary[key]) el.textContent = dictionary[key];
        });

        document
          .getElementById("startHourInput")
          .setAttribute("aria-label", dictionary.startAria);
        document
          .getElementById("endHourInput")
          .setAttribute("aria-label", dictionary.endAria);

        subheadingPresets.textContent = "";
        dictionary.subheadingOptions.forEach(([value, label]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "preset-chip";
          button.dataset.value = value;
          button.textContent = label;
          button.addEventListener("click", () => {
            subheadingInput.value = value;
            updateTemplate();
          });
          subheadingPresets.appendChild(button);
        });
        if (previousSubheadingIndex >= 0) {
          subheadingInput.value =
            dictionary.subheadingOptions[previousSubheadingIndex][0];
        }

        if (
          previousParagraph === LEGAL_DEFAULTS.ru ||
          previousParagraph === LEGAL_DEFAULTS.uz
        ) {
          paragraphInput.value = LEGAL_DEFAULTS[language];
        }

        const fileText = document.getElementById("logo2UploadText");
        if (fileText && fileText.dataset.hasFile !== "true") {
          fileText.textContent = dictionary.fileEmpty;
        }

        const logoPlaceholder = document.getElementById("logo2PlaceholderText");
        if (logoPlaceholder)
          logoPlaceholder.textContent = dictionary.logoPlaceholder;

        updateTemplate();
      }

      function updateTemplate() {
        const heading = getWorkingHoursHeading();
        const subheading = (
          document.getElementById("subheadingInput").value || " "
        ).toLocaleLowerCase();
        const paragraph =
          document.getElementById("paragraphInput").value || " ";
        const paragraphEl = document.getElementById("paragraphSvg");

        let y = 234;

        const headingLines = wrapSvgText(
          document.getElementById("headingSvg"),
          heading,
          336,
          42,
          y,
        );
        y += headingLines * 42;

        const subheadingLines = wrapSvgText(
          document.getElementById("subheadingSvg"),
          subheading,
          336,
          24,
          y,
        );
        y += subheadingLines * 24 + 10;

        const paragraphLines = wrapSvgText(
          paragraphEl,
          paragraph,
          PARAGRAPH_MAX_WIDTH,
          PARAGRAPH_LINE_HEIGHT,
          y,
        );
        const paragraphY =
          WHITE_RECT_HEIGHT -
          WHITE_RECT_BOTTOM_PADDING -
          (paragraphLines - 1) * PARAGRAPH_LINE_HEIGHT;
        wrapSvgText(
          paragraphEl,
          paragraph,
          PARAGRAPH_MAX_WIDTH,
          PARAGRAPH_LINE_HEIGHT,
          paragraphY,
        );

        applySemanticPreviewColors(document.getElementById("templateSvg"));
      }

      function getWorkingHoursHeading() {
        const start = formatTime(
          document.getElementById("startHourInput").value,
          "08:00",
        );
        const end = formatTime(
          document.getElementById("endHourInput").value,
          "20:00",
        );
        return `${start}–${end}`;
      }

      function formatTime(value, fallback) {
        return /^\d{2}:\d{2}$/.test(value) ? value : fallback;
      }

      function loadOutlineFont(file) {
        const reader = new FileReader();

        reader.onload = (e) => {
          try {
            outlineFont = opentype.parse(e.target.result);
            alert("Font loaded for outline export.");
          } catch (error) {
            outlineFont = null;
            alert("Could not load this font. Try another .otf or .ttf.");
          }
        };

        reader.readAsArrayBuffer(file);
      }

      async function loadDefaultOutlineFont() {
        try {
          const response = await fetch(OUTLINE_FONT_URL);
          if (!response.ok)
            throw new Error(`Could not load ${OUTLINE_FONT_URL}`);

          const buffer = await response.arrayBuffer();
          outlineFont = opentype.parse(buffer);
        } catch (error) {
          outlineFont = null;
          console.warn(error);
        }
      }

      function opentypePathToSvgD(path) {
        return path.commands
          .map((cmd) => {
            if (cmd.type === "M") return `M ${cmd.x} ${cmd.y}`;
            if (cmd.type === "L") return `L ${cmd.x} ${cmd.y}`;
            if (cmd.type === "C")
              return `C ${cmd.x1} ${cmd.y1} ${cmd.x2} ${cmd.y2} ${cmd.x} ${cmd.y}`;
            if (cmd.type === "Q")
              return `Q ${cmd.x1} ${cmd.y1} ${cmd.x} ${cmd.y}`;
            if (cmd.type === "Z") return "Z";
            return "";
          })
          .join(" ");
      }

      function outlineTextElement(textEl, font) {
        const group = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "g",
        );
        const colorName = textEl.dataset.color || "black";
        const fontSize = parseFloat(textEl.getAttribute("font-size")) || 16;
        const letterSpacing =
          parseFloat(textEl.getAttribute("letter-spacing")) || 0;
        const textAnchor = textEl.getAttribute("text-anchor") || "start";
        const tspans = [...textEl.querySelectorAll("tspan")];

        group.setAttribute("data-color", colorName);

        tspans.forEach((tspan) => {
          const text = tspan.textContent || " ";
          let x = parseFloat(tspan.getAttribute("x"));
          const y = parseFloat(tspan.getAttribute("y"));
          const glyphs = [...text].map((char) => font.charToGlyph(char));
          const textWidth = glyphs.reduce((width, glyph, index) => {
            const advance = (glyph.advanceWidth / font.unitsPerEm) * fontSize;
            return (
              width + advance + (index < glyphs.length - 1 ? letterSpacing : 0)
            );
          }, 0);

          if (textAnchor === "middle") x -= textWidth / 2;
          if (textAnchor === "end") x -= textWidth;

          glyphs.forEach((glyph) => {
            const path = glyph.getPath(x, y, fontSize);
            const d = opentypePathToSvgD(path);

            if (d.trim()) {
              const pathEl = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path",
              );
              pathEl.setAttribute("d", d);
              pathEl.setAttribute("data-color", colorName);
              pathEl.setAttribute("fill", brandHex(colorName));
              group.appendChild(pathEl);
            }

            x +=
              (glyph.advanceWidth / font.unitsPerEm) * fontSize + letterSpacing;
          });
        });

        textEl.replaceWith(group);
      }

      function outlineAllText(svgRoot) {
        if (!outlineFont) {
          alert(
            "WBSans-Medium.otf is not loaded yet. If this keeps happening, open this folder through a local web server so the browser can fetch the font file.",
          );
          return false;
        }

        ["headingSvg", "subheadingSvg", "paragraphSvg"].forEach((id) => {
          const textEl = svgRoot.querySelector(`#${id}`);
          if (textEl) outlineTextElement(textEl, outlineFont);
        });

        return true;
      }

      function tokenizePath(d) {
        return (
          d.match(/[a-zA-Z]|[-+]?(?:\d*\.\d+|\d+\.?)(?:[eE][-+]?\d+)?/g) || []
        );
      }

      function transformPoint(matrix, x, y) {
        if (!matrix) return { x, y };

        return {
          x: matrix.a * x + matrix.c * y + matrix.e,
          y: matrix.b * x + matrix.d * y + matrix.f,
        };
      }

      function toMmPoint(point) {
        return [point.x * SCALE, point.y * SCALE];
      }

      function getRootRelativeMatrix(pathEl, rootSvg) {
        const pathMatrix = pathEl.getScreenCTM();
        const rootMatrix = rootSvg.getScreenCTM();

        if (!pathMatrix || !rootMatrix) return pathEl.getCTM();

        return rootMatrix.inverse().multiply(pathMatrix);
      }

      function parsePathToJsPdfLines(pathEl, rootSvg) {
        const d = pathEl.getAttribute("d");
        const tokens = tokenizePath(d);
        const matrix = getRootRelativeMatrix(pathEl, rootSvg);

        let i = 0;
        let cmd = "";
        let cx = 0;
        let cy = 0;
        let sx = 0;
        let sy = 0;
        const lines = [];

        function isCmd(token) {
          return /^[a-zA-Z]$/.test(token);
        }

        function num() {
          return parseFloat(tokens[i++]);
        }

        function addMove(x, y) {
          const p = transformPoint(matrix, x, y);
          const [mx, my] = toMmPoint(p);
          lines.push({ op: "m", c: [mx, my] });
          cx = x;
          cy = y;
          sx = x;
          sy = y;
        }

        function addLine(x, y) {
          const p = transformPoint(matrix, x, y);
          const [mx, my] = toMmPoint(p);
          lines.push({ op: "l", c: [mx, my] });
          cx = x;
          cy = y;
        }

        function addCurve(x1, y1, x2, y2, x, y) {
          const p1 = transformPoint(matrix, x1, y1);
          const p2 = transformPoint(matrix, x2, y2);
          const p = transformPoint(matrix, x, y);

          const [m1x, m1y] = toMmPoint(p1);
          const [m2x, m2y] = toMmPoint(p2);
          const [mx, my] = toMmPoint(p);

          lines.push({ op: "c", c: [m1x, m1y, m2x, m2y, mx, my] });
          cx = x;
          cy = y;
        }

        while (i < tokens.length) {
          if (isCmd(tokens[i])) cmd = tokens[i++];

          const relative = cmd === cmd.toLowerCase();
          const C = cmd.toUpperCase();

          if (C === "M") {
            const x = num();
            const y = num();
            addMove(relative ? cx + x : x, relative ? cy + y : y);
            cmd = relative ? "l" : "L";

            while (i < tokens.length && !isCmd(tokens[i])) {
              const lx = num();
              const ly = num();
              addLine(relative ? cx + lx : lx, relative ? cy + ly : ly);
            }
          } else if (C === "L") {
            while (i < tokens.length && !isCmd(tokens[i])) {
              const x = num();
              const y = num();
              addLine(relative ? cx + x : x, relative ? cy + y : y);
            }
          } else if (C === "H") {
            while (i < tokens.length && !isCmd(tokens[i])) {
              const x = num();
              addLine(relative ? cx + x : x, cy);
            }
          } else if (C === "V") {
            while (i < tokens.length && !isCmd(tokens[i])) {
              const y = num();
              addLine(cx, relative ? cy + y : y);
            }
          } else if (C === "C") {
            while (i < tokens.length && !isCmd(tokens[i])) {
              let x1 = num(),
                y1 = num(),
                x2 = num(),
                y2 = num(),
                x = num(),
                y = num();

              if (relative) {
                x1 += cx;
                y1 += cy;
                x2 += cx;
                y2 += cy;
                x += cx;
                y += cy;
              }

              addCurve(x1, y1, x2, y2, x, y);
            }
          } else if (C === "Q") {
            while (i < tokens.length && !isCmd(tokens[i])) {
              let qx = num(),
                qy = num(),
                x = num(),
                y = num();

              if (relative) {
                qx += cx;
                qy += cy;
                x += cx;
                y += cy;
              }

              const c1x = cx + (2 / 3) * (qx - cx);
              const c1y = cy + (2 / 3) * (qy - cy);
              const c2x = x + (2 / 3) * (qx - x);
              const c2y = y + (2 / 3) * (qy - y);

              addCurve(c1x, c1y, c2x, c2y, x, y);
            }
          } else if (C === "Z") {
            lines.push({ op: "h", c: [] });
            cx = sx;
            cy = sy;
          } else {
            // Unsupported commands: S, T, A.
            // Minimal exporter intentionally skips them.
            break;
          }
        }

        return lines;
      }

      function rectToJsPdfLines(rectEl, rootSvg) {
        const x = parseFloat(rectEl.getAttribute("x")) || 0;
        const y = parseFloat(rectEl.getAttribute("y")) || 0;
        const width = parseFloat(rectEl.getAttribute("width")) || 0;
        const height = parseFloat(rectEl.getAttribute("height")) || 0;
        const rx = Math.min(
          parseFloat(rectEl.getAttribute("rx")) || 0,
          width / 2,
        );
        const ry = Math.min(
          parseFloat(rectEl.getAttribute("ry")) || rx,
          height / 2,
        );
        const matrix = getRootRelativeMatrix(rectEl, rootSvg);
        const lines = [];
        const k = 0.5522847498;

        function point(px, py) {
          return toMmPoint(transformPoint(matrix, px, py));
        }

        function move(px, py) {
          const [mx, my] = point(px, py);
          lines.push({ op: "m", c: [mx, my] });
        }

        function line(px, py) {
          const [mx, my] = point(px, py);
          lines.push({ op: "l", c: [mx, my] });
        }

        function curve(x1, y1, x2, y2, px, py) {
          const [m1x, m1y] = point(x1, y1);
          const [m2x, m2y] = point(x2, y2);
          const [mx, my] = point(px, py);
          lines.push({ op: "c", c: [m1x, m1y, m2x, m2y, mx, my] });
        }

        if (!width || !height) return lines;

        if (!rx && !ry) {
          move(x, y);
          line(x + width, y);
          line(x + width, y + height);
          line(x, y + height);
          lines.push({ op: "h", c: [] });
          return lines;
        }

        move(x + rx, y);
        line(x + width - rx, y);
        curve(
          x + width - rx + rx * k,
          y,
          x + width,
          y + ry - ry * k,
          x + width,
          y + ry,
        );
        line(x + width, y + height - ry);
        curve(
          x + width,
          y + height - ry + ry * k,
          x + width - rx + rx * k,
          y + height,
          x + width - rx,
          y + height,
        );
        line(x + rx, y + height);
        curve(
          x + rx - rx * k,
          y + height,
          x,
          y + height - ry + ry * k,
          x,
          y + height - ry,
        );
        line(x, y + ry);
        curve(x, y + ry - ry * k, x + rx - rx * k, y, x + rx, y);
        lines.push({ op: "h", c: [] });

        return lines;
      }

      function getNearestColorName(el) {
        let node = el;

        while (node && node.nodeType === 1) {
          if (node.dataset && node.dataset.color) return node.dataset.color;
          if (node.dataset && node.dataset.logoColor)
            return node.dataset.logoColor;
          node = node.parentElement;
        }

        return "black";
      }

      function drawShapeElementAsCmyk(doc, el, rootSvg) {
        const fill = el.getAttribute("fill");

        if (fill === "none") return;

        const colorName = getNearestColorName(el);
        setCmykFill(doc, colorName);

        const lines =
          el.tagName.toLowerCase() === "rect"
            ? rectToJsPdfLines(el, rootSvg)
            : parsePathToJsPdfLines(el, rootSvg);

        if (lines.length) {
          doc.path(lines);
          doc.fill();
        }
      }

      function applyTemplateClip(doc, rootSvg) {
        const clipEl = [...rootSvg.children].find(
          (el) =>
            el.tagName.toLowerCase() === "rect" && el.dataset.color === "red",
        );

        if (!clipEl || typeof doc.clip !== "function") return () => {};

        const lines = rectToJsPdfLines(clipEl, rootSvg);
        if (!lines.length) return () => {};

        if (typeof doc.saveGraphicsState === "function")
          doc.saveGraphicsState();

        doc.path(lines);
        doc.clip();

        if (typeof doc.discardPath === "function") doc.discardPath();

        return () => {
          if (typeof doc.restoreGraphicsState === "function")
            doc.restoreGraphicsState();
        };
      }

      function appendHiddenSvgClone(clone) {
        clone.style.position = "absolute";
        clone.style.left = "0";
        clone.style.top = "0";
        clone.style.width = "420px";
        clone.style.height = `${PAGE_HEIGHT_PX}px`;
        clone.style.opacity = "0";
        clone.style.pointerEvents = "none";
        clone.setAttribute("width", "420");
        clone.setAttribute("height", PAGE_HEIGHT_PX);
        document.body.appendChild(clone);
      }

      async function exportPdf() {
        if (outlineFontLoadPromise) await outlineFontLoadPromise;
        if (document.fonts && document.fonts.ready) await document.fonts.ready;

        updateTemplate();

        const sourceSvg = document.getElementById("templateSvg");
        const clone = sourceSvg.cloneNode(true);

        applySemanticPreviewColors(clone);
        appendHiddenSvgClone(clone);

        const outlined = outlineAllText(clone);
        if (!outlined) {
          clone.remove();
          return;
        }

        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: [PAGE_MM, PAGE_HEIGHT_MM],
          compress: true,
        });

        setCmykFill(doc, "white");
        doc.rect(0, 0, PAGE_MM, PAGE_HEIGHT_MM, "F");

        const restoreClip = applyTemplateClip(doc, clone);

        clone.querySelectorAll("path, rect").forEach((el) => {
          drawShapeElementAsCmyk(doc, el, clone);
        });

        restoreClip();

        clone.remove();

        doc.save("hours.pdf");
      }

      document
        .getElementById("fontUpload")
        .addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (file) loadOutlineFont(file);
        });

      [
        "startHourInput",
        "endHourInput",
        "subheadingInput",
        "paragraphInput",
      ].forEach((id) => {
        document.getElementById(id).addEventListener("input", updateTemplate);
        document.getElementById(id).addEventListener("change", updateTemplate);
      });

      document
        .getElementById("languageInput")
        .addEventListener("change", (event) => {
          applyLanguage(event.target.value);
        });

      handleSvgUpload("logo2Upload", "logo2Slot");
      loadDefaultLogo1();

      document.getElementById("exportBtn").addEventListener("click", exportPdf);

      outlineFontLoadPromise = loadDefaultOutlineFont();

      if (document.fonts) {
        document.fonts.load('500 44px "WBSans"').then(updateTemplate);
      }

      applyLanguage(document.getElementById("languageInput").value);
    </script>
  </body>
</html>
